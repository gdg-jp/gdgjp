name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.0"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - parallel:
          - name: Build accounts
            run: pnpm --filter @gdgjp/accounts build
          - name: Build tinyurl
            run: pnpm --filter @gdgjp/tinyurl build
          - name: Build wiki
            run: pnpm --filter @gdgjp/wiki build
          - name: Build img
            run: pnpm --filter @gdgjp/img build
          - name: Build scheduler
            run: pnpm --filter @gdgjp/scheduler build
          - name: Build tinyurl gateway
            run: pnpm --filter @gdgjp/tinyurl-gateway build
          - name: Build go extension
            run: pnpm --filter @gdgjp/go-extension build
      - parallel:
          - name: Deploy accounts to Cloudflare Workers
            uses: cloudflare/wrangler-action@v3
            with:
              apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              workingDirectory: accounts
              packageManager: pnpm
              command: deploy
          - name: Deploy tinyurl to Cloudflare Workers
            uses: cloudflare/wrangler-action@v3
            with:
              apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              workingDirectory: tinyurl
              packageManager: pnpm
              command: deploy
          - name: Deploy wiki to Cloudflare Workers
            uses: cloudflare/wrangler-action@v3
            with:
              apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              workingDirectory: wiki
              packageManager: pnpm
              command: deploy
          - name: Deploy img to Cloudflare Workers
            uses: cloudflare/wrangler-action@v3
            with:
              apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              workingDirectory: img
              packageManager: pnpm
              command: deploy
          - name: Deploy scheduler to Cloudflare Workers
            uses: cloudflare/wrangler-action@v3
            with:
              apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              workingDirectory: scheduler
              packageManager: pnpm
              command: deploy
          - name: Deploy tinyurl gateway to Vercel
            run: pnpm --filter @gdgjp/tinyurl-gateway exec vercel deploy --prod --yes --token="$VERCEL_TOKEN"
            env:
              VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
              VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
              VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Upload go extension package
        uses: actions/upload-artifact@v4
        with:
          name: gdg-japan-go-links-${{ github.sha }}
          path: go-extension/dist/gdg-japan-go-links.zip
          retention-days: 30
      - name: Create go extension release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: go-extension-${{ github.sha }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" go-extension/dist/gdg-japan-go-links.zip --clobber
          else
            gh release create "$TAG_NAME" go-extension/dist/gdg-japan-go-links.zip \
              --target "$GITHUB_SHA" \
              --title "GDG Japan Go Links ($GITHUB_SHA)" \
              --notes "Automated extension package for commit $GITHUB_SHA."
          fi

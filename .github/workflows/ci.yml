name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - parallel:
          - name: Typecheck accounts
            run: pnpm --filter @gdgjp/accounts typecheck
          - name: Typecheck tinyurl
            run: pnpm --filter @gdgjp/tinyurl typecheck
          - name: Typecheck wiki
            run: pnpm --filter @gdgjp/wiki typecheck
          - name: Typecheck img
            run: pnpm --filter @gdgjp/img typecheck
          - name: Typecheck scheduler
            run: pnpm --filter @gdgjp/scheduler typecheck
          - name: Typecheck gdg-lib
            run: pnpm --filter @gdgjp/gdg-lib typecheck
          - name: Typecheck tinyurl gateway
            run: pnpm --filter @gdgjp/tinyurl-gateway typecheck
          - name: Typecheck go extension
            run: pnpm --filter @gdgjp/go-extension typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - parallel:
          - name: Test accounts
            run: pnpm --filter @gdgjp/accounts test
          - name: Test tinyurl
            run: pnpm --filter @gdgjp/tinyurl test
          - name: Test wiki
            run: pnpm --filter @gdgjp/wiki test
          - name: Test img
            run: pnpm --filter @gdgjp/img test
          - name: Test scheduler
            run: pnpm --filter @gdgjp/scheduler test
          - name: Test gdg-lib
            run: pnpm --filter @gdgjp/gdg-lib test
          - name: Test tinyurl gateway
            run: pnpm --filter @gdgjp/tinyurl-gateway test
          - name: Test go extension
            run: pnpm --filter @gdgjp/go-extension test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - parallel:
          - name: Build accounts
            run: pnpm --filter @gdgjp/accounts build
          - name: Build tinyurl
            run: pnpm --filter @gdgjp/tinyurl build
          - name: Build wiki
            run: pnpm --filter @gdgjp/wiki build
          - name: Build img
            run: pnpm --filter @gdgjp/img build
          - name: Build scheduler
            run: pnpm --filter @gdgjp/scheduler build
          - name: Build tinyurl gateway
            run: pnpm --filter @gdgjp/tinyurl-gateway build
          - name: Build go extension
            run: pnpm --filter @gdgjp/go-extension build
      - name: Validate go extension package
        run: unzip -t go-extension/dist/gdg-japan-go-links.zip
      - name: Upload go extension package
        uses: actions/upload-artifact@v4
        with:
          name: gdg-japan-go-links
          path: go-extension/dist/gdg-japan-go-links.zip
          retention-days: 14

  e2e:
    name: E2E (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # wiki's inherited e2e suite (tests/e2e/access-control.spec.ts) seeds
        # users directly into the local miniflare D1 sqlite file, which
        # @cloudflare/vite-plugin only creates lazily on first query. The
        # wiki app's loaders short-circuit for anonymous requests before
        # touching D1, so the sqlite file is never created during CI's
        # webServer warmup and global-setup throws. Tracked as a follow-up:
        # rewrite global-setup to migrate-then-seed via better-sqlite3 at a
        # deterministic path. Page-access logic is still covered by the
        # vitest unit suite (Unit tests (wiki)) in the meantime.
        app: [accounts, tinyurl, img, scheduler]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create accounts dev vars
        run: |
          cat > accounts/.dev.vars <<EOF
          IDP_SESSION_SECRET=ci-idp-session-secret
          TINYURL_CLIENT_SECRET=ci-idp-client-secret
          IMG_CLIENT_SECRET=ci-idp-client-secret
          SCHEDULER_CLIENT_SECRET=ci-idp-client-secret
          WIKI_CLIENT_SECRET=ci-idp-client-secret
          APP_URL=http://localhost:5173
          TINYURL_REDIRECT_URLS=http://localhost:5174/api/auth/callback/gdgjp
          IMG_REDIRECT_URLS=http://localhost:5175/api/auth/callback/gdgjp
          SCHEDULER_REDIRECT_URLS=http://localhost:5176/api/auth/callback/gdgjp
          WIKI_REDIRECT_URLS=http://localhost:5177/api/auth/callback/gdgjp
          EOF

          cat > tinyurl/.dev.vars <<EOF
          RP_SESSION_SECRET=ci-rp-session-secret
          IDP_CLIENT_SECRET=ci-idp-client-secret
          APP_URL=http://localhost:5174
          ACCOUNTS_URL=http://localhost:5173
          IDP_URL=http://localhost:5173
          SHORT_URL_BASE=http://localhost:5174
          EOF

          cat > img/.dev.vars <<EOF
          RP_SESSION_SECRET=ci-better-auth-secret
          IDP_CLIENT_SECRET=ci-idp-client-secret
          INTERNAL_API_SECRET=ci-internal-api-secret
          APP_URL=http://localhost:5175
          ACCOUNTS_URL=http://localhost:5173
          IDP_URL=http://localhost:5173
          EOF

          cat > scheduler/.dev.vars <<EOF
          RP_SESSION_SECRET=ci-better-auth-secret
          IDP_CLIENT_SECRET=ci-idp-client-secret
          APP_URL=http://localhost:5176
          ACCOUNTS_URL=http://localhost:5173
          IDP_URL=http://localhost:5173
          EOF
      - name: Install Playwright browsers
        run: pnpm --filter @gdgjp/${{ matrix.app }} exec playwright install --with-deps chromium
      - name: Run E2E testing
        run: pnpm --filter @gdgjp/${{ matrix.app }} test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.app }}
          path: "${{ matrix.app }}/playwright-report/"
          retention-days: 7

name = "gdgjp-accounts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "./workers/app.ts"

[vars]
APP_URL = "https://accounts.gdgs.jp"
GOOGLE_CLIENT_ID = "144403252439-hnm3r310icb0l9o6v5hqrurf6h2faidi.apps.googleusercontent.com"
EMAIL_FROM = "GDG Japan <noreply@gdgs.jp>"
# Placeholder so cf-typegen surfaces this on Env. The real value MUST be set
# per-environment with `wrangler secret put BETTER_AUTH_SECRET` — secrets
# override [vars] at runtime.
BETTER_AUTH_SECRET = "set-via-wrangler-secret-put"
# Trusted OAuth clients. The admin seed route writes them into D1's oauthClient table.
TINYURL_CLIENT_ID = "tinyurl"
TINYURL_REDIRECT_URLS = "https://url.gdgs.jp/api/auth/callback/gdgjp"
WIKI_CLIENT_ID = "wiki"
WIKI_REDIRECT_URLS = "https://wiki.gdgs.jp/api/auth/callback/gdgjp"
IMG_CLIENT_ID = "img"
IMG_REDIRECT_URLS = "https://img.gdgs.jp/api/auth/callback/gdgjp"
SCHEDULER_CLIENT_ID = "scheduler"
SCHEDULER_REDIRECT_URLS = "https://scheduler.gdgs.jp/api/auth/callback/gdgjp"

[assets]
binding = "ASSETS"
directory = "./build/client"

[[d1_databases]]
binding = "DB"
database_name = "gdgjp-accounts-db"
database_id = "87860848-d6bc-43e0-97c5-346ab8a88e31"
migrations_dir = "./migrations"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

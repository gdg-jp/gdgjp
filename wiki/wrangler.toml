name = "gdgjp-wiki"
main = "./workers/app.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = true
invocation_logs = true

# Static assets are served alongside the Worker
[assets]
directory = "./build/client"
binding = "ASSETS"
run_worker_first = ["/ws/*", "/agents/*"]

[[routes]]
pattern = "wiki.gdgs.jp/*"
zone_name = "gdgs.jp"

[vars]
ENVIRONMENT = "production"
BASE_URL = "https://wiki.gdgs.jp"
APP_URL = "https://wiki.gdgs.jp"
ACCOUNTS_URL = "https://accounts.gdgs.jp"
IDP_URL = "https://accounts.gdgs.jp"
IDP_CLIENT_ID = "wiki"
GEMINI_MODEL_ID = "gemini-3-flash-preview"
FIREBASE_API_KEY = "AIzaSyBDHVMd25wph9m8x4smxTvfGJ3C6OmfrDY"
FIREBASE_AUTH_DOMAIN = "gdgsjp.firebaseapp.com"
FIREBASE_PROJECT_ID = "gdgsjp"
FIREBASE_MESSAGING_SENDER_ID = "144403252439"
FIREBASE_APP_ID = "1:144403252439:web:2c0b43b6d1fae907225c92"
FIREBASE_VAPID_KEY = "BA2fyubCOAJDghcOUaeFa089aupwgeHrT4UMT6rAx2fBX28vEw4NkCo8pp0E7OOcM71T5SdyhsfszNL5Or5_FxY"

# ---------------------------------------------------------------------------
# Cloudflare D1 — managed SQLite database
# database_id is populated by scripts/migrate-wiki-2-import.sh after the
# database is created in the gdgjp Cloudflare account.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "gdgjp-wiki-db"
database_id = "1b401b78-77b7-4206-88f2-7474cf3ef2ea"
migrations_dir = "./migrations"

# ---------------------------------------------------------------------------
# Cloudflare R2 — object storage for page attachments / ingestion uploads
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "gdgjp-wiki-storage"

# ---------------------------------------------------------------------------
# Cloudflare Queues — background translation jobs
# ---------------------------------------------------------------------------
[[queues.producers]]
binding = "TRANSLATION_QUEUE"
queue = "gdgjp-wiki-translation-jobs"

[[queues.consumers]]
queue = "gdgjp-wiki-translation-jobs"
max_batch_size = 10
max_batch_timeout = 30

# ---------------------------------------------------------------------------
# Cloudflare Browser Rendering — headless Chromium for PDF generation
# ---------------------------------------------------------------------------
[browser]
binding = "BROWSER"

# ---------------------------------------------------------------------------
# Workers AI (for bge-m3 embeddings)
# ---------------------------------------------------------------------------
[ai]
binding = "AI"

# ---------------------------------------------------------------------------
# Vectorize — semantic search index for page embeddings
# Create with: wrangler vectorize create gdgjp-wiki-pages --dimensions 1024 --metric cosine
# ---------------------------------------------------------------------------
[[vectorize]]
binding = "VECTORIZE"
index_name = "gdgjp-wiki-pages"

# ---------------------------------------------------------------------------
# Durable Objects — realtime collaborative editing
# ---------------------------------------------------------------------------
[durable_objects]
bindings = [
  { name = "COLLAB_DO", class_name = "CollabDurableObject" },
  { name = "GENERATION_AGENT", class_name = "WikiGenerationAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollabDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["WikiIngestionAgent"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["WikiGenerationAgent"]
deleted_classes = ["WikiIngestionAgent"]

[[workflows]]
name = "gdgjp-wiki-generation"
binding = "GENERATION_WORKFLOW"
class_name = "WikiGenerationWorkflow"

# ---------------------------------------------------------------------------
# Cron Triggers
# ---------------------------------------------------------------------------
[triggers]
crons = ["0 15 * * *"]

# ---------------------------------------------------------------------------
# Secrets (set via `wrangler secret put`)
# RP_SESSION_SECRET       — HMAC key for the RP's signed session + OIDC tx cookies
# IDP_CLIENT_SECRET       — OAuth client secret shared with accounts IdP
#                           (matches WIKI_CLIENT_SECRET in accounts)
# GEMINI_API_KEY          — Google Gemini API key (for AI features)
# GOOGLE_DOCS_CLIENT_ID   — Google Docs API client ID (for ingestion)
# GOOGLE_DOCS_CLIENT_SECRET — Google Docs API client secret (for ingestion)
# RESEND_API_KEY          — Resend transactional email API key
# WIKI_DISCORD_SECRET     — shared secret for Discord bot → wiki API auth
# FCM_SERVICE_ACCOUNT_JSON — Firebase service account key JSON (for push notifications)
# DISCORD_BOT_TOKEN       — Discord bot token for sending DM reminders
# ---------------------------------------------------------------------------
